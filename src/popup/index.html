<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HuntKit</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f10; color: #f4f4f5; }
      @keyframes huntkit-spin { to { transform: rotate(360deg); } }
      .huntkit-spinner {
        width: 20px;
        height: 20px;
        border: 2px solid #3f3f46;
        border-top-color: #a78bfa;
        border-radius: 50%;
        animation: huntkit-spin 0.8s linear infinite;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
